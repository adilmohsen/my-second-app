<!DOCTYPE html>
<html>
<head>
    <title>تحكم مريوم 🎮</title>
    <style>
        body { background: #0b141a; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .btn { 
            background: #8a2be2; color: white; border: none; 
            padding: 20px 40px; margin: 10px; border-radius: 15px; 
            font-size: 20px; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #a052ee; transform: scale(1.1); }
    </style>
</head>
<body>
    <h1>لوحة تحكم مريوم الذكية 🚀</h1>
    <button class="btn" onclick="fetch('/open_notepad')">افتح Notepad 📝</button>
    <br>
    <button class="btn" onclick="fetch('/open_chrome')">افتح Google Chrome 🌐</button>
</body>
</html>
